<div class="page-container">
  <div class="form-box">
    <h2>Add Book</h2>

    <form [formGroup]="addBookForm" (ngSubmit)="handleSubmit()">
      <div class="form-group">
        <label for="bookName">Book Name:</label>
        <input type="text" formControlName="bookName" id="bookName" placeholder="Enter book name" />
      </div>

      <div class="form-group">
        <label for="authorName">Author Name:</label>
        <input type="text" formControlName="authorName" id="authorName" placeholder="Enter author name" />
      </div>

      <div class="form-group">
        <label for="category">Category:</label>
        <select formControlName="category" id="category">
          <option value="" disabled selected>Select Category</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Competitive Exams">Competitive Exams</option>
          <option value="Academic Texts">Academic Texts</option>
          <option value="Children & Young Adults">Children & Young Adults</option>
          <option value="School">School</option>
          <option value="Self Help">Self Help</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Family & Relationships">Family & Relationships</option>
          <option value="Religion & Spirituality">Religion & Spirituality</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="price">Price:</label>
        <input type="number" formControlName="price" id="price" placeholder="Enter price" />
      </div>

      <div class="form-group">
        <label for="coverFileName">Cover File Name:</label>
        <input type="text" formControlName="coverFileName" id="coverFileName" placeholder="Enter cover image file name (e.g., book1.jpg)" />
      </div>

      <!-- New Description field -->
      <div class="form-group">
        <label for="description">Description:</label>
        <textarea formControlName="description" id="description" placeholder="Enter book description"></textarea>
      </div>
      <div class="form-group">
        <label for="isPopular">Is Popular:</label>
        <input type="checkbox" formControlName="isPopular" id="isPopular" />
      </div>
      
      
      <button type="submit" [disabled]="addBookForm.invalid" class="submit-btn">Submit</button>
    </form>

    <div class="back-button">
      <button (click)="goBackHome()">← Back to Home</button>
    </div>
  </div>
</div>
